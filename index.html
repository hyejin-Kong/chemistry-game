<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>화학 반응식 마스터</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1923;
    --surface: #1a2a3a;
    --surface2: #1e3448;
    --accent: #00e5ff;
    --accent2: #ff6b35;
    --accent3: #7fff6b;
    --text: #e8f4f8;
    --text-muted: #7a9db5;
    --success: #4cff91;
    --error: #ff4c6b;
    --gold: #ffd700;
    --border: rgba(0,229,255,0.2);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nanum Gothic', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 70%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 25%, rgba(0,229,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 85%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 40%, rgba(255,107,53,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 20% 50%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 60%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 10%, rgba(0,229,255,0.2) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 20px;
  }

  .header {
    text-align: center;
    padding: 30px 0 20px;
  }
  .header h1 {
    font-family: 'Jua', sans-serif;
    font-size: 2.4rem;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 2px;
  }
  .header p {
    color: var(--text-muted);
    margin-top: 6px;
    font-size: 0.95rem;
  }

  .progress-container {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 16px 0;
    background: var(--surface);
    border-radius: 50px;
    padding: 10px 18px;
    border: 1px solid var(--border);
  }
  .progress-label { font-size: 0.8rem; color: var(--text-muted); white-space: nowrap; }
  .progress-bar { flex: 1; height: 8px; background: rgba(255,255,255,0.08); border-radius: 50px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 50px; transition: width 0.5s ease; }
  .score-badge { background: linear-gradient(135deg, var(--accent2), #ff9500); color: white; font-family: 'Jua', sans-serif; padding: 4px 14px; border-radius: 50px; font-size: 0.9rem; white-space: nowrap; }

  .reaction-selector { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin: 20px 0; }
  .reaction-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px; cursor: pointer; transition: all 0.2s; text-align: center; }
  .reaction-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .reaction-card.selected { border-color: var(--accent); background: rgba(0,229,255,0.08); }
  .reaction-card.completed { border-color: var(--success); }
  .reaction-card .emoji { font-size: 2rem; margin-bottom: 8px; }
  .reaction-card .name { font-size: 0.85rem; font-weight: 700; }
  .reaction-card .status { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; }
  .reaction-card.completed .status { color: var(--success); }

  .stage-nav { display: flex; gap: 8px; margin: 20px 0; background: var(--surface); border-radius: 16px; padding: 8px; border: 1px solid var(--border); }
  .stage-btn { flex: 1; padding: 10px; border-radius: 10px; border: none; background: transparent; color: var(--text-muted); font-family: 'Nanum Gothic', sans-serif; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .stage-btn.active { background: linear-gradient(135deg, rgba(0,229,255,0.15), rgba(255,107,53,0.15)); color: var(--text); border: 1px solid var(--border); }
  .stage-btn.done { color: var(--success); }
  .stage-btn .stage-num { font-family: 'Jua', sans-serif; font-size: 1.1rem; }
  .stage-btn .stage-label { font-size: 0.72rem; }

  .game-area { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 28px; min-height: 300px; position: relative; }

  .stage-title { font-family: 'Jua', sans-serif; font-size: 1.3rem; color: var(--accent); margin-bottom: 6px; display: flex; align-items: center; gap: 10px; }
  .stage-desc { color: var(--text-muted); font-size: 0.88rem; margin-bottom: 24px; line-height: 1.6; }

  .reaction-sentence { background: var(--surface2); border-radius: 14px; padding: 18px 22px; font-size: 1.05rem; line-height: 1.8; margin-bottom: 24px; border: 1px solid rgba(255,255,255,0.06); }
  .reaction-sentence strong { color: var(--accent); }

  .equation-builder { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; min-height: 60px; background: rgba(0,0,0,0.25); border-radius: 14px; padding: 14px 18px; border: 2px dashed rgba(0,229,255,0.2); margin-bottom: 20px; }
  .equation-builder.drag-over { border-color: var(--accent); background: rgba(0,229,255,0.05); }

  .eq-slot { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

  /* ─── CHIP: touch-action none 필수 ─── */
  .word-chip {
    background: linear-gradient(135deg, rgba(0,229,255,0.15), rgba(0,229,255,0.05));
    border: 1px solid rgba(0,229,255,0.4);
    border-radius: 8px;
    padding: 6px 14px;
    font-size: 0.9rem;
    cursor: grab;
    transition: all 0.15s;
    white-space: nowrap;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;   /* ← 핵심: 터치 스크롤 차단 */
  }
  .word-chip:hover { border-color: var(--accent); background: rgba(0,229,255,0.2); }
  .word-chip.dragging { opacity: 0.4; }

  .symbol-chip { background: linear-gradient(135deg, rgba(255,107,53,0.2), rgba(255,107,53,0.05)); border: 1px solid rgba(255,107,53,0.5); border-radius: 8px; padding: 6px 14px; font-size: 1rem; font-weight: 800; color: var(--accent2); }

  .word-pool { display: flex; flex-wrap: wrap; gap: 10px; padding: 16px; background: rgba(0,0,0,0.2); border-radius: 12px; min-height: 56px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px; }
  .word-pool-label { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 8px; }

  .formula-equation { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; margin-bottom: 28px; }
  .formula-slot { min-width: 80px; min-height: 52px; background: rgba(0,0,0,0.3); border: 2px dashed rgba(0,229,255,0.3); border-radius: 10px; display: flex; align-items: center; justify-content: center; padding: 8px 12px; transition: all 0.2s; font-size: 1rem; }
  .formula-slot.filled { border-style: solid; border-color: rgba(0,229,255,0.5); background: rgba(0,229,255,0.08); }
  .formula-slot.drag-over { border-color: var(--accent); background: rgba(0,229,255,0.12); }
  .formula-slot.correct { border-color: var(--success); background: rgba(76,255,145,0.08); }
  .formula-slot.wrong { border-color: var(--error); background: rgba(255,76,107,0.08); animation: shake 0.3s ease; }

  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }

  .formula-slot .slot-label { font-size: 0.7rem; color: var(--text-muted); text-align: center; line-height: 1.3; }

  .formula-chip {
    background: linear-gradient(135deg, rgba(127,255,107,0.15), rgba(127,255,107,0.05));
    border: 1px solid rgba(127,255,107,0.4);
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 0.95rem;
    cursor: grab;
    transition: all 0.15s;
    white-space: nowrap;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;   /* ← 핵심 */
  }
  .formula-chip:hover { border-color: var(--accent3); transform: scale(1.03); }
  .formula-chip.dragging { opacity: 0.4; }
  .formula-chip.used { opacity: 0.3; cursor: default; }

  .formula-pool { display: flex; flex-wrap: wrap; gap: 10px; padding: 18px; background: rgba(0,0,0,0.2); border-radius: 14px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px; }
  .formula-pool-label { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 10px; }

  sub { font-size: 0.7em; vertical-align: sub; }
  sup { font-size: 0.65em; vertical-align: super; }

  .balancing-area { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; background: rgba(0,0,0,0.25); border-radius: 14px; padding: 20px; border: 1px solid rgba(255,255,255,0.06); margin-bottom: 24px; }

  .coeff-group { display: flex; align-items: center; gap: 4px; }
  .coeff-input { width: 40px; height: 40px; background: rgba(0,0,0,0.4); border: 2px solid rgba(0,229,255,0.3); border-radius: 8px; color: var(--accent); font-family: 'Jua', sans-serif; font-size: 1.1rem; text-align: center; outline: none; transition: border-color 0.2s; }
  .coeff-input:focus { border-color: var(--accent); }
  .coeff-input.correct { border-color: var(--success); color: var(--success); }
  .coeff-input.wrong { border-color: var(--error); color: var(--error); animation: shake 0.3s ease; }

  .formula-display { font-size: 1.15rem; padding: 6px 12px; background: var(--surface2); border-radius: 8px; border: 1px solid rgba(255,255,255,0.08); }

  .atom-counter { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
  .atom-count-badge { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; font-size: 0.82rem; display: flex; gap: 10px; }
  .atom-count-badge .atom-sym { color: var(--accent); font-weight: 700; }
  .atom-count-badge .left-count { color: var(--text-muted); }
  .atom-count-badge .right-count { color: var(--text-muted); }
  .atom-count-badge.balanced .left-count, .atom-count-badge.balanced .right-count { color: var(--success); }
  .atom-count-badge.unbalanced .left-count, .atom-count-badge.unbalanced .right-count { color: var(--error); }

  .btn { padding: 11px 24px; border-radius: 10px; border: none; font-family: 'Jua', sans-serif; font-size: 1rem; cursor: pointer; transition: all 0.2s; }
  .btn-primary { background: linear-gradient(135deg, var(--accent), #0097b2); color: #0f1923; }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,229,255,0.3); }
  .btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }
  .btn-secondary:hover { border-color: var(--accent); color: var(--text); }
  .btn-success { background: linear-gradient(135deg, var(--success), #00b860); color: #0f1923; }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }

  .feedback { padding: 14px 18px; border-radius: 12px; margin-top: 16px; font-size: 0.92rem; line-height: 1.6; display: none; }
  .feedback.show { display: block; }
  .feedback.correct-fb { background: rgba(76,255,145,0.08); border: 1px solid rgba(76,255,145,0.3); color: var(--success); }
  .feedback.wrong-fb { background: rgba(255,76,107,0.08); border: 1px solid rgba(255,76,107,0.3); color: var(--error); }
  .feedback.hint-fb { background: rgba(255,215,0,0.08); border: 1px solid rgba(255,215,0,0.3); color: var(--gold); }

  .completion-screen { text-align: center; padding: 40px 20px; display: none; }
  .completion-screen.show { display: block; }
  .completion-emoji { font-size: 5rem; margin-bottom: 16px; animation: bounce 0.8s ease infinite alternate; }
  @keyframes bounce { from{transform:translateY(0)} to{transform:translateY(-12px)} }
  .completion-screen h2 { font-family: 'Jua', sans-serif; font-size: 2rem; background: linear-gradient(135deg, var(--gold), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 12px; }
  .completion-screen p { color: var(--text-muted); margin-bottom: 24px; }
  .stars { font-size: 2rem; letter-spacing: 8px; margin: 16px 0; }

  .stage-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; gap: 8px; flex-wrap: wrap; }
  .hint-btn { background: rgba(255,215,0,0.12); border: 1px solid rgba(255,215,0,0.3); color: var(--gold); border-radius: 8px; padding: 6px 14px; font-size: 0.82rem; cursor: pointer; font-family: 'Nanum Gothic', sans-serif; transition: all 0.2s; }
  .hint-btn:hover { background: rgba(255,215,0,0.2); }

  .arrow-sym { font-size: 1.3rem; color: var(--accent2); font-weight: 900; padding: 0 4px; }
  .plus-sym { font-size: 1.2rem; color: var(--text-muted); font-weight: 700; }

  .reaction-info-bar { background: var(--surface2); border-radius: 12px; padding: 12px 18px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.06); font-size: 0.88rem; color: var(--text-muted); }
  .reaction-info-bar strong { color: var(--text); }

  /* tap selection highlight */
  .word-chip.tap-selected, .formula-chip.tap-selected {
    border-color: var(--gold) !important;
    background: rgba(255,215,0,0.2) !important;
    transform: scale(1.06);
    box-shadow: 0 0 12px rgba(255,215,0,0.4);
  }
  .formula-slot.tap-ready, .equation-builder.tap-ready {
    border-color: var(--gold) !important;
    background: rgba(255,215,0,0.08) !important;
    animation: pulse 0.8s ease infinite alternate;
  }
  @keyframes pulse { from{opacity:0.7} to{opacity:1} }

  /* 드래그 중 떠다니는 ghost 클론 */
  .drag-ghost {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    opacity: 0.85;
    transform: scale(1.08);
    transition: none;
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 0.95rem;
    white-space: nowrap;
    background: rgba(0,229,255,0.3);
    border: 2px solid var(--accent);
    color: var(--text);
    font-family: 'Nanum Gothic', sans-serif;
    box-shadow: 0 6px 24px rgba(0,229,255,0.4);
  }

  .all-complete { display: none; text-align: center; padding: 50px 24px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; margin-top: 20px; position: relative; overflow: hidden; }
  .all-complete.show { display: block; }
  .all-complete::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 0%, rgba(0,229,255,0.08) 0%, transparent 70%), radial-gradient(ellipse at 50% 100%, rgba(255,107,53,0.06) 0%, transparent 70%); pointer-events: none; }
  .all-complete-trophy { font-size: 5rem; animation: trophyBounce 1s ease infinite alternate; display: block; margin-bottom: 8px; }
  @keyframes trophyBounce { from{transform:translateY(0) rotate(-5deg)} to{transform:translateY(-14px) rotate(5deg)} }
  .all-complete h2 { font-family: 'Jua', sans-serif; font-size: 2rem; background: linear-gradient(135deg, var(--gold), var(--accent2), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 14px; }
  .all-complete p { color: var(--text-muted); font-size: 0.95rem; line-height: 1.8; margin-bottom: 6px; }
  .all-complete .final-score { font-family: 'Jua', sans-serif; font-size: 2.5rem; color: var(--gold); margin: 20px 0 8px; }
  .confetti-row { font-size: 1.8rem; letter-spacing: 6px; margin: 16px 0; animation: confettiFade 1.5s ease infinite alternate; }
  @keyframes confettiFade { from{opacity:0.6} to{opacity:1} }
  .all-complete .replay-btn { margin-top: 24px; background: linear-gradient(135deg, var(--accent), #0097b2); color: #0f1923; border: none; padding: 13px 32px; border-radius: 12px; font-family: 'Jua', sans-serif; font-size: 1.05rem; cursor: pointer; transition: all 0.2s; }
  .all-complete .replay-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(0,229,255,0.3); }

  @media (max-width: 600px) {
    .header h1 { font-size: 1.7rem; }
    .header { padding: 20px 0 12px; }
    .app { padding: 12px; }
    .game-area { padding: 16px; }
    .balancing-area { gap: 6px; padding: 14px; }
    .formula-display { font-size: 0.95rem; }
    .stage-btn .stage-label { display: none; }
    .stage-btn .stage-num { font-size: 0.95rem; }
    .reaction-selector { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .reaction-card { padding: 12px 8px; }
    .reaction-card .emoji { font-size: 1.6rem; margin-bottom: 4px; }
    .reaction-card .name { font-size: 0.78rem; }
    .stage-title { font-size: 1.1rem; }
    .btn { padding: 12px 18px; font-size: 0.95rem; }
    .word-chip { padding: 10px 16px; font-size: 1rem; }
    .formula-chip { padding: 11px 18px; font-size: 1rem; }
    .formula-slot { min-height: 58px; min-width: 70px; }
    .coeff-input { width: 46px; height: 46px; font-size: 1.2rem; }
    .atom-count-badge { font-size: 0.8rem; padding: 8px 12px; }
    .progress-label { display: none; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>⚗️ 화학 반응식 마스터</h1>
    <p>반응식을 단계별로 완성해 보세요!</p>
  </div>

  <div class="progress-container">
    <span class="progress-label">진행도</span>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="score-badge">⭐ <span id="scoreDisplay">0</span>점</div>
  </div>

  <div id="reactionSelector" class="reaction-selector"></div>

  <div class="stage-nav" id="stageNav" style="display:none">
    <button class="stage-btn active" id="stageBtnA" onclick="goStage(1)">
      <span class="stage-num">1단계</span>
      <span class="stage-label">물질의 이름으로 반응식</span>
    </button>
    <button class="stage-btn" id="stageBtnB" onclick="goStage(2)">
      <span class="stage-num">2단계</span>
      <span class="stage-label">화학식으로 바꾸기</span>
    </button>
    <button class="stage-btn" id="stageBtnC" onclick="goStage(3)">
      <span class="stage-num">3단계</span>
      <span class="stage-label">계수 맞추기</span>
    </button>
  </div>

  <div class="game-area" id="gameArea" style="display:none">
    <div id="stageContent"></div>
    <div class="feedback" id="feedback"></div>
  </div>

  <div class="all-complete" id="allComplete">
    <span class="all-complete-trophy">🏆</span>
    <div class="confetti-row">🎉 🎊 🥳 🎉 🎊</div>
    <h2>모든 반응식 마스터 완료!</h2>
    <p>6개의 화학 반응식을 모두 완성했어요.<br>반응물, 생성물, 화학식, 계수까지 완벽하게 익혔습니다!</p>
    <p style="color:var(--accent);margin-top:10px;">⚗️ 이제 진짜 화학자의 첫걸음을 뗐어요!</p>
    <div class="final-score" id="finalScore"></div>
    <p style="font-size:0.82rem;color:var(--text-muted)">획득 점수</p>
    <button class="replay-btn" onclick="resetAll()">🔄 처음부터 다시 도전</button>
  </div>
</div>

<script>
// ============================================================
// UNIFIED DRAG & DROP  (마우스 + 터치 통합)
// ============================================================
// 전략: 마우스는 HTML5 drag API, 터치는 포인터 이벤트로 ghost clone 직접 이동
// 두 경로 모두 같은 dropDispatch() 함수로 drop 처리
// ============================================================

const reactions = [
  {
    id:0, level:1, emoji:'🕯️', name:'탄소의 연소',
    description:'탄소가 산소와 반응하여 이산화탄소가 생성됩니다.',
    reactants:['탄소','산소'], products:['이산화탄소'],
    formulas:{'탄소':'C','산소':'O₂','이산화탄소':'CO₂'},
    formulaRaw:{'탄소':'C','산소':'O2','이산화탄소':'CO2'},
    coefficients:[1,1,1],
    atoms:{C:{C:1},O2:{O:2},CO2:{C:1,O:2}},
    decoyFormulas:['H₂','H₂O','N₂'], decoyRaw:['H2','H2O','N2'],
  },
  {
    id:1, level:2, emoji:'🔬', name:'염화나트륨 생성',
    description:'나트륨과 염소가 반응하여 염화나트륨(소금)이 됩니다.',
    reactants:['나트륨','염소'], products:['염화나트륨'],

    formulas:{'물':'H₂O','수소':'H₂','산소':'O₂'},

  {

    description:'철이 산소와 반응하여 산화철(III)이 생성됩니다.',
    reactants:['철','산소'], products:['산화철(III)'],
    formulas:{'철':'Fe','산소':'O₂','산화철(III)':'Fe₂O₃'},

    decoyFormulas:['H₂O','CO₂','NaCl'], decoyRaw:['H2O','CO2','NaCl'],
  },
  {

    reactants:['이산화탄소','물'], products:['포도당','산소'],
    formulas:{'이산화탄소':'CO₂','물':'H₂O','포도당':'C₆H₁₂O₆','산소':'O₂'},
    formulaRaw:{'이산화탄소':'CO2','물':'H2O','포도당':'C6H12O6','산소':'O2'},
    coefficients:[6,6,1,6],
    atoms:{CO2:{C:1,O:2},H2O:{H:2,O:1},C6H12O6:{C:6,H:12,O:6},O2:{O:2}},
    decoyFormulas:['N₂','NaCl','Fe₂O₃'], decoyRaw:['N2','NaCl','Fe2O3'],
  }
];

let state = {
  currentReaction: null,
  currentStage: 1,
  stageComplete: [false,false,false],
  score: 0,
  reactionScores: {},
  s1_left:[], s1_right:[], s1_pool:[],
  s2_pool:[], s2_slots:{},
};

// ── 탭 선택(tap-to-select) 상태 ──
let tapSelected = null;
let tapSelectedEl = null;

function clearTapSelection() {
  if (tapSelectedEl) {
    tapSelectedEl.classList.remove('tap-selected');
    tapSelectedEl = null;
  }
  document.querySelectorAll('.tap-ready').forEach(el => el.classList.remove('tap-ready'));
  tapSelected = null;
}

// ── 터치 드래그 ghost 상태 ──
let touchGhost = null;
let touchDragData = null;   // { stage, ...payload }
let touchOffsetX = 0, touchOffsetY = 0;

function createGhost(text, x, y) {
  removeGhost();
  touchGhost = document.createElement('div');
  touchGhost.className = 'drag-ghost';
  touchGhost.innerHTML = renderFormula(text);
  touchGhost.style.left = (x - 40) + 'px';
  touchGhost.style.top  = (y - 24) + 'px';
  document.body.appendChild(touchGhost);
}
function moveGhost(x, y) {
  if (!touchGhost) return;
  touchGhost.style.left = (x - 40) + 'px';
  touchGhost.style.top  = (y - 24) + 'px';
}
function removeGhost() {
  if (touchGhost) { touchGhost.remove(); touchGhost = null; }
}

// 터치 좌표 아래의 실제 drop 대상 찾기 (ghost 일시 숨김)
function elementFromTouchPoint(x, y) {
  if (touchGhost) touchGhost.style.display = 'none';
  const el = document.elementFromPoint(x, y);
  if (touchGhost) touchGhost.style.display = '';
  return el;
}

// ============================================================
// STAGE 1 – 이름 드래그
// ============================================================
function renderStage1() {
  const r = state.currentReaction;
  const allWords = [...r.reactants, ...r.products];
  state.s1_left = [];
  state.s1_right = [];
  state.s1_pool = shuffle([...allWords]);

  const content = `
    <div class="stage-header">
      <div class="stage-title">✏️ 1단계: 물질의 이름으로 반응식 만들기</div>
      <div><button class="hint-btn" onclick="showHint()">💡 힌트</button></div>
    </div>
    <div class="stage-desc">아래 물질 이름을 드래그하거나 눌러서 반응물/생성물 칸에 넣으세요.</div>
    <div class="reaction-info-bar">📖 <strong>${r.name}</strong>: ${r.description}</div>

    <div class="word-pool-label">📦 물질 이름</div>
    <div class="word-pool" id="s1Pool"
      ondragover="event.preventDefault();this.classList.add('drag-over')"
      ondragleave="this.classList.remove('drag-over')"
      ondrop="s1DropToPool(event)">
    </div>

    <div style="display:flex;align-items:flex-start;gap:10px;flex-wrap:wrap;margin-bottom:16px;">
      <div style="flex:1;min-width:140px;">
        <div class="word-pool-label">⬅️ 반응물</div>
        <div class="equation-builder" id="s1Left"
          ondragover="event.preventDefault();this.classList.add('drag-over')"
          ondragleave="this.classList.remove('drag-over')"
          ondrop="s1Drop(event,'left')"></div>
      </div>
      <div class="arrow-sym" style="font-size:2rem;margin-top:26px;">→</div>
      <div style="flex:1;min-width:140px;">
        <div class="word-pool-label">➡️ 생성물</div>
        <div class="equation-builder" id="s1Right"
          ondragover="event.preventDefault();this.classList.add('drag-over')"
          ondragleave="this.classList.remove('drag-over')"
          ondrop="s1Drop(event,'right')"></div>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" onclick="checkStage1()">✅ 확인하기</button>
      <button class="btn btn-secondary" onclick="renderStage1()">🔄 다시하기</button>
    </div>
  `;
  document.getElementById('stageContent').innerHTML = content;
  s1Refresh();
}

function s1Refresh() {
  const pool  = document.getElementById('s1Pool');
  const left  = document.getElementById('s1Left');
  const right = document.getElementById('s1Right');
  if (pool)  pool.innerHTML  = state.s1_pool.map(w => s1Chip(w,'pool')).join('');
  if (left)  left.innerHTML  = s1SideHTML(state.s1_left,'left');
  if (right) right.innerHTML = s1SideHTML(state.s1_right,'right');
  // 터치 이벤트 재등록
  document.querySelectorAll('.word-chip').forEach(chip => {
    chip.addEventListener('touchstart', onChipTouchStart, {passive:false});
  });
  // zone tap (빈 영역 클릭) 등록 — zone 자체에 onclick 없이 pointerup으로 처리
}

function s1Chip(w, src) {
  return `<div class="word-chip" draggable="true"
    data-word="${w}" data-src="${src}" data-stage="s1"
    ondragstart="s1DragStart(event)"
    ondragend="s1DragEnd(event)"
    onclick="s1ChipClick(this,'${w}','${src}')"
  >${w}</div>`;
}

function s1SideHTML(words, side) {
  if (!words.length) return '';
  return words.map((w,i) =>
    s1Chip(w, side) + (i < words.length-1 ? `<span class="plus-sym">+</span>` : '')
  ).join('');
}

// 마우스 drag
let s1DragWord = null, s1DragSrc = null;
function s1DragStart(e) {
  s1DragWord = e.currentTarget.dataset.word;
  s1DragSrc  = e.currentTarget.dataset.src;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function s1DragEnd(e) { e.currentTarget.classList.remove('dragging'); }

function s1Drop(e, side) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  const word = s1DragWord || touchDragData?.word;
  const src  = s1DragSrc  || touchDragData?.src;
  if (!word) return;
  s1RemoveFromSrc(word, src);
  if (side === 'left')  state.s1_left.push(word);
  else                  state.s1_right.push(word);
  s1DragWord = null; s1DragSrc = null;
  s1Refresh();
}
function s1DropToPool(e) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  const word = s1DragWord || touchDragData?.word;
  const src  = s1DragSrc  || touchDragData?.src;
  if (!word) return;
  s1RemoveFromSrc(word, src);
  if (!state.s1_pool.includes(word)) state.s1_pool.push(word);
  s1DragWord = null; s1DragSrc = null;
  s1Refresh();
}
function s1RemoveFromSrc(word, src) {
  if (src === 'pool')  state.s1_pool  = state.s1_pool.filter(w=>w!==word);
  if (src === 'left')  state.s1_left  = state.s1_left.filter(w=>w!==word);
  if (src === 'right') state.s1_right = state.s1_right.filter(w=>w!==word);
}

// 클릭(탭) – tap-to-select
function s1ChipClick(el, word, src) {
  // 터치 드래그 중엔 무시
  if (touchDragData) return;
  if (tapSelected && tapSelected.type==='s1' && tapSelected.word===word && tapSelected.src===src) {
    clearTapSelection(); return;
  }
  clearTapSelection();
  tapSelected = {type:'s1', word, src};
  tapSelectedEl = el;
  el.classList.add('tap-selected');
  document.getElementById('s1Left') ?.classList.add('tap-ready');
  document.getElementById('s1Right')?.classList.add('tap-ready');
  document.getElementById('s1Pool') ?.classList.add('tap-ready');
}

// zone 클릭 시 chip이 선택돼있으면 이동
document.addEventListener('click', function(e) {
  if (!tapSelected || tapSelected.type !== 's1') return;
  const left  = document.getElementById('s1Left');
  const right = document.getElementById('s1Right');
  const pool  = document.getElementById('s1Pool');
  let zone = null;
  if (left  && (left  === e.target || left.contains(e.target)))  zone = 'left';
  if (right && (right === e.target || right.contains(e.target))) zone = 'right';
  if (pool  && (pool  === e.target || pool.contains(e.target)))  zone = 'pool';
  if (!zone) return;
  // chip 클릭은 제외
  if (e.target.classList.contains('word-chip')) return;
  const {word, src} = tapSelected;
  clearTapSelection();
  s1RemoveFromSrc(word, src);
  if (zone === 'left')  state.s1_left.push(word);
  else if (zone === 'right') state.s1_right.push(word);
  else state.s1_pool.push(word);
  s1Refresh();
}, true);

function checkStage1() {
  const r = state.currentReaction;
  if (!state.s1_left.length && !state.s1_right.length) {
    showFeedback('물질 이름을 반응물과 생성물 칸에 넣어보세요!','hint'); return;
  }
  const leftOk  = arraysMatch(state.s1_left.slice().sort(),  r.reactants.slice().sort());
  const rightOk = arraysMatch(state.s1_right.slice().sort(), r.products.slice().sort());
  if (leftOk && rightOk) {
    markStageComplete(0,30);
    showFeedback(`🎉 정답! <strong>${r.reactants.join(' + ')} → ${r.products.join(' + ')}</strong><br>반응물과 생성물을 올바르게 구분했어요!`,'correct');
    addNextStageBtn(2);
  } else {
    let hint = '';
    if (!leftOk)  hint += `반응물: ${r.reactants.length}개 `;
    if (!rightOk) hint += `생성물: ${r.products.length}개`;
    showFeedback('❌ 다시 확인해보세요. ' + hint,'wrong');
  }
}

// ============================================================
// STAGE 2 – 화학식 드래그
// ============================================================
function renderStage2() {
  const r = state.currentReaction;
  const allNames = [...r.reactants, ...r.products];
  const corrects = allNames.map(n => ({name:n, formula:r.formulas[n], raw:r.formulaRaw[n], correct:true}));
  const decoys   = r.decoyFormulas.map((f,i)=>({name:null, formula:f, raw:r.decoyRaw[i], correct:false}));
  state.s2_pool  = shuffle([...corrects, ...decoys]);
  state.s2_slots = {};

  const content = `
    <div class="stage-header">
      <div class="stage-title">🔬 2단계: 화학식으로 바꾸기</div>
      <div><button class="hint-btn" onclick="showHint()">💡 힌트</button></div>
    </div>
    <div class="stage-desc">화학식 카드를 드래그하거나 눌러서 올바른 자리에 놓으세요.<br>
    답이 아닌 카드도 섞여 있으니 주의하세요!</div>

    <div style="font-size:0.82rem;color:var(--text-muted);margin-bottom:10px;">반응식:</div>
    <div class="formula-equation" id="s2Equation">
      ${buildS2Equation(r, allNames)}
    </div>

    <div class="formula-pool-label">🃏 화학식 카드</div>
    <div class="formula-pool" id="s2Pool"
      ondragover="event.preventDefault()"
      ondrop="s2DropToPool(event)">
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" onclick="checkStage2()">✅ 확인하기</button>
      <button class="btn btn-secondary" onclick="renderStage2()">🔄 다시하기</button>
    </div>
  `;
  document.getElementById('stageContent').innerHTML = content;
  s2Refresh();
}

function buildS2Equation(r, allNames) {
  let html = '';
  r.reactants.forEach((name,i) => {
    html += s2Slot(allNames.indexOf(name), name);
    if (i < r.reactants.length-1) html += `<span class="plus-sym">+</span>`;
  });
  html += `<span class="arrow-sym">→</span>`;
  r.products.forEach((name,i) => {
    html += s2Slot(allNames.indexOf(name), name);
    if (i < r.products.length-1) html += `<span class="plus-sym">+</span>`;
  });
  return html;
}

function s2Slot(idx, name) {
  return `<div class="formula-slot" id="s2slot_${idx}" data-slot="${idx}" data-name="${name}"
    ondragover="event.preventDefault();this.classList.add('drag-over')"
    ondragleave="this.classList.remove('drag-over')"
    ondrop="s2Drop(event,${idx})"
    onclick="s2SlotClick(${idx})">
    <span class="slot-label">${name}</span>
  </div>`;
}

function s2FormulaChip(p, i) {
  return `<div class="formula-chip" draggable="true"
    data-idx="${i}" data-formula="${p.formula}" data-stage="s2"
    ondragstart="s2DragStart(event)"
    ondragend="s2DragEnd(event)"
    onclick="s2ChipClick(this,'${p.formula}',${i})"
  >${renderFormula(p.formula)}</div>`;
}

function s2Refresh() {
  const r = state.currentReaction;
  const allNames = [...r.reactants, ...r.products];
  const usedIdx  = new Set(Object.values(state.s2_slots).filter(Boolean).map(v=>v.poolIdx));

  allNames.forEach((name,i)=>{
    const slot = document.getElementById(`s2slot_${i}`);
    if (!slot) return;
    const val = state.s2_slots[i];
    if (val) {
      slot.innerHTML = `<span style="font-size:1.05rem">${renderFormula(val.formula)}</span>`;
      slot.classList.add('filled');
    } else {
      slot.innerHTML = `<span class="slot-label">${name}</span>`;
      slot.classList.remove('filled','correct','wrong');
    }
  });

  const pool = document.getElementById('s2Pool');
  if (pool) {
    pool.innerHTML = state.s2_pool
      .map((p,i) => usedIdx.has(String(i)) ? '' : s2FormulaChip(p,i))
      .join('');
  }

  // 터치 이벤트 재등록
  document.querySelectorAll('.formula-chip').forEach(chip => {
    chip.addEventListener('touchstart', onChipTouchStart, {passive:false});
  });
}

let s2DragFormula=null, s2DragIdx=null;
function s2DragStart(e) {
  s2DragFormula = e.currentTarget.dataset.formula;
  s2DragIdx     = e.currentTarget.dataset.idx;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function s2DragEnd(e) { e.currentTarget.classList.remove('dragging'); }

function s2Drop(e, slotIdx) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  const formula = s2DragFormula || touchDragData?.formula;
  const poolIdx = s2DragIdx     || touchDragData?.poolIdx;
  if (!formula) return;
  state.s2_slots[slotIdx] = {formula, poolIdx:String(poolIdx)};
  s2DragFormula=null; s2DragIdx=null;
  s2Refresh();
}
function s2DropToPool(e) {
  e.preventDefault();
  s2DragFormula=null; s2DragIdx=null;
}

function s2ChipClick(el, formula, poolIdx) {
  if (touchDragData) return;
  if (tapSelected && tapSelected.type==='s2' && tapSelected.poolIdx===poolIdx) {
    clearTapSelection(); return;
  }
  clearTapSelection();
  tapSelected = {type:'s2', formula, poolIdx};
  tapSelectedEl = el;
  el.classList.add('tap-selected');
  document.querySelectorAll('.formula-slot').forEach(s=>s.classList.add('tap-ready'));
}

function s2SlotClick(slotIdx) {
  if (touchDragData) return;
  if (tapSelected && tapSelected.type==='s2') {
    const {formula, poolIdx} = tapSelected;
    clearTapSelection();
    state.s2_slots[slotIdx] = {formula, poolIdx:String(poolIdx)};
    s2Refresh();
  } else if (state.s2_slots[slotIdx]) {
    // 이미 채워진 슬롯 클릭 → 제거
    state.s2_slots[slotIdx] = null;
    s2Refresh();
  }
}

function checkStage2() {
  const r = state.currentReaction;
  const allNames = [...r.reactants, ...r.products];
  if (!allNames.every((_,i)=>state.s2_slots[i])) {
    showFeedback('모든 빈 칸을 채워주세요!','hint'); return;
  }
  let ok = true;
  allNames.forEach((name,i)=>{
    const slot = document.getElementById(`s2slot_${i}`);
    const expected = r.formulaRaw[name];
    const got = state.s2_pool[Number(state.s2_slots[i]?.poolIdx)]?.raw;
    slot.classList.remove('correct','wrong');
    if (got !== expected) { ok=false; slot.classList.add('wrong'); setTimeout(()=>slot.classList.remove('wrong'),600); }
    else { slot.classList.add('correct'); }
  });
  if (ok) {
    markStageComplete(1,30);
    const eq = r.reactants.map(n=>r.formulas[n]).join(' + ') + ' → ' + r.products.map(n=>r.formulas[n]).join(' + ');
    showFeedback(`🎉 정답! <strong>${eq}</strong><br>화학식을 올바르게 맞췄어요!`,'correct');
    addNextStageBtn(3);
  } else {
    showFeedback('❌ 틀린 화학식이 있어요. 다시 확인해보세요!','wrong');
  }
}

// ============================================================
// STAGE 3 – 계수 입력
// ============================================================
function renderStage3() {
  const r = state.currentReaction;
  const content = `
    <div class="stage-header">
      <div class="stage-title">⚖️ 3단계: 계수 맞추기</div>
      <div><button class="hint-btn" onclick="showHint()">💡 힌트</button></div>
    </div>
    <div class="stage-desc">화학식 앞의 빈 칸에 알맞은 계수를 입력하세요.<br>
    계수가 1이면 빈 칸으로 두세요.</div>
    <div class="balancing-area" id="s3Equation">${buildS3Equation(r)}</div>
    <div id="atomCounter" class="atom-counter"></div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="checkStage3()">✅ 확인하기</button>
      <button class="btn btn-secondary" onclick="clearCoeffs()">🔄 초기화</button>
    </div>
  `;
  document.getElementById('stageContent').innerHTML = content;
  updateAtomCounter();
}

function buildS3Equation(r) {
  let html = '';
  r.reactants.forEach((name,i)=>{
    html += coeffGroup(name,r,`left_${i}`);
    if (i < r.reactants.length-1) html += `<span class="plus-sym">+</span>`;
  });
  html += `<span class="arrow-sym">→</span>`;
  r.products.forEach((name,i)=>{
    html += coeffGroup(name,r,`right_${i}`);
    if (i < r.products.length-1) html += `<span class="plus-sym">+</span>`;
  });
  return html;
}

function coeffGroup(name,r,id) {
  return `<div class="coeff-group">
    <input class="coeff-input" type="text" inputmode="numeric" id="coeff_${id}"
      maxlength="2" placeholder="?" oninput="validateCoeff(this);updateAtomCounter()"/>
    <div class="formula-display">${renderFormula(r.formulas[name])}</div>
  </div>`;
}

function validateCoeff(el) {
  el.value = el.value.replace(/[^0-9]/g,'');
  const v = parseInt(el.value);
  if (v===1){ el.value=''; el.placeholder='1은 안 써요'; setTimeout(()=>{el.placeholder='?';},1400); }
  else if (v>20){ el.value='20'; }
}

function getCoeff(id) {
  const el = document.getElementById('coeff_'+id);
  if (!el) return 1;
  const v = parseInt(el.value);
  return isNaN(v)||v<2 ? 1 : v;
}

function updateAtomCounter() {
  const r = state.currentReaction;
  const leftAtoms={}, rightAtoms={};
  r.reactants.forEach((name,i)=>{
    const c=getCoeff(`left_${i}`), atoms=r.atoms[r.formulaRaw[name]]||{};
    Object.entries(atoms).forEach(([el,n])=>{ leftAtoms[el]=(leftAtoms[el]||0)+c*n; });
  });
  r.products.forEach((name,i)=>{
    const c=getCoeff(`right_${i}`), atoms=r.atoms[r.formulaRaw[name]]||{};
    Object.entries(atoms).forEach(([el,n])=>{ rightAtoms[el]=(rightAtoms[el]||0)+c*n; });
  });
  const allElems=new Set([...Object.keys(leftAtoms),...Object.keys(rightAtoms)]);
  const counter=document.getElementById('atomCounter');
  if (!counter) return;
  counter.innerHTML=Array.from(allElems).map(el=>{
    const lc=leftAtoms[el]||0, rc=rightAtoms[el]||0, balanced=lc===rc&&lc>0;
    return `<div class="atom-count-badge ${lc===rc&&lc>0?'balanced':lc>0||rc>0?'unbalanced':''}">
      <span class="atom-sym">${el}</span>
      <span class="left-count">반응물: ${lc}</span>
      <span style="color:var(--text-muted)">|</span>
      <span class="right-count">생성물: ${rc}</span>
      ${balanced?'<span style="color:var(--success)">✓</span>':''}
    </div>`;
  }).join('');
}

function clearCoeffs() {
  const r=state.currentReaction;
  [...r.reactants.map((_,i)=>`left_${i}`),...r.products.map((_,i)=>`right_${i}`)].forEach(id=>{
    const el=document.getElementById(`coeff_${id}`); if(el) el.value='';
  });
  updateAtomCounter(); hideFeedback();
}

function checkStage3() {
  const r=state.currentReaction;
  const needsCoeff=r.coefficients.some(c=>c>1);
  const anyFilled=[...r.reactants.map((_,i)=>`left_${i}`),...r.products.map((_,i)=>`right_${i}`)]
    .some(id=>{ const el=document.getElementById('coeff_'+id); return el&&parseInt(el.value)>=2; });
  if (needsCoeff&&!anyFilled){ showFeedback('⚠️ 계수가 필요한 반응이에요. 2 이상 숫자를 입력해보세요!','hint'); return; }

  const leftAtoms={}, rightAtoms={};
  r.reactants.forEach((name,i)=>{ const c=getCoeff(`left_${i}`),atoms=r.atoms[r.formulaRaw[name]]||{}; Object.entries(atoms).forEach(([el,n])=>{leftAtoms[el]=(leftAtoms[el]||0)+c*n;}); });
  r.products.forEach((name,i)=>{ const c=getCoeff(`right_${i}`),atoms=r.atoms[r.formulaRaw[name]]||{}; Object.entries(atoms).forEach(([el,n])=>{rightAtoms[el]=(rightAtoms[el]||0)+c*n;}); });
  const allElems=new Set([...Object.keys(leftAtoms),...Object.keys(rightAtoms)]);
  const isBalanced=Array.from(allElems).every(el=>leftAtoms[el]===rightAtoms[el]);

  const gotCoeffs=[...r.reactants.map((_,i)=>getCoeff(`left_${i}`)),...r.products.map((_,i)=>getCoeff(`right_${i}`))];

  if (isBalanced) {
    const g=gotCoeffs.reduce(gcd);
    const isMinimal=g===1;
    const allIds=[...r.reactants.map((_,i)=>`left_${i}`),...r.products.map((_,i)=>`right_${i}`)];
    allIds.forEach(id=>{ const el=document.getElementById(`coeff_${id}`); if(el){ el.classList.remove('correct','wrong'); el.classList.add(isMinimal?'correct':'wrong'); } });
    if (isMinimal) {
      markStageComplete(2,40);
      showFeedback(`🎉 완벽해요! <strong>${buildBalancedEqString(r,gotCoeffs)}</strong><br>반응 전과 후의 원자 수가 모두 같아요! 🏆`,'correct');
      addNextStageBtn(4);
    } else {
      showFeedback(`⚠️ 원소 수는 맞지만 계수를 더 줄일 수 있어요. 계수들의 최대공약수(${g})로 나눠보세요.`,'hint');
    }
  } else {
    const unbalanced=Array.from(allElems).filter(el=>leftAtoms[el]!==rightAtoms[el]);
    showFeedback(`❌ 아직 맞지 않아요. ${unbalanced.join(', ')} 원소의 수가 달라요!`,'wrong');
  }
}

function buildBalancedEqString(r,coeffs) {
  const left=r.reactants.map((n,i)=>(coeffs[i]===1?'':coeffs[i])+r.formulas[n]).join(' + ');
  const right=r.products.map((n,i)=>(coeffs[r.reactants.length+i]===1?'':coeffs[r.reactants.length+i])+r.formulas[n]).join(' + ');
  return `${left} → ${right}`;
}

function gcd(a,b){return b===0?a:gcd(b,a%b);}

// ============================================================
// TOUCH DRAG  (pointer / touch events)
// ============================================================
// 포인터 이벤트 기반 구현 – 모든 기기에서 동작
// ============================================================

function onChipTouchStart(e) {
  // 이미 tap-selected 상태면 tap flow에 맡김
  if (tapSelected) return;

  e.preventDefault(); // 스크롤 차단이 핵심!
  const touch = e.touches[0];
  const chip  = e.currentTarget;
  const stage = chip.dataset.stage;

  if (stage === 's1') {
    touchDragData = { stage:'s1', word:chip.dataset.word, src:chip.dataset.src };
    createGhost(chip.dataset.word, touch.clientX, touch.clientY);
  } else if (stage === 's2') {
    touchDragData = { stage:'s2', formula:chip.dataset.formula, poolIdx:chip.dataset.idx };
    createGhost(chip.dataset.formula, touch.clientX, touch.clientY);
  }

  chip.classList.add('dragging');

  function onMove(ev) {
    ev.preventDefault();
    const t = ev.touches[0];
    moveGhost(t.clientX, t.clientY);
  }
  function onEnd(ev) {
    const t = ev.changedTouches[0];
    chip.classList.remove('dragging');
    removeGhost();

    const target = elementFromTouchPoint(t.clientX, t.clientY);
    if (touchDragData) {
      dispatchTouchDrop(touchDragData, target);
    }
    touchDragData = null;
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('touchend',  onEnd);
  }

  document.addEventListener('touchmove', onMove, {passive:false});
  document.addEventListener('touchend',  onEnd,  {passive:false});
}

function dispatchTouchDrop(data, targetEl) {
  if (!targetEl) return;

  if (data.stage === 's1') {
    // 어떤 zone에 떨어졌는지 확인
    const left  = document.getElementById('s1Left');
    const right = document.getElementById('s1Right');
    const pool  = document.getElementById('s1Pool');
    let zone = null;
    if (left  && (left===targetEl  || left.contains(targetEl)))  zone='left';
    if (right && (right===targetEl || right.contains(targetEl))) zone='right';
    if (pool  && (pool===targetEl  || pool.contains(targetEl)))  zone='pool';
    if (!zone) { touchDragData=null; return; }
    s1RemoveFromSrc(data.word, data.src);
    if (zone==='left')  state.s1_left.push(data.word);
    else if (zone==='right') state.s1_right.push(data.word);
    else if (!state.s1_pool.includes(data.word)) state.s1_pool.push(data.word);
    touchDragData=null;
    s1Refresh();

  } else if (data.stage === 's2') {
    // slot에 떨어졌는지 확인
    const slotEl = targetEl.closest('.formula-slot');
    if (slotEl) {
      const slotIdx = parseInt(slotEl.dataset.slot);
      state.s2_slots[slotIdx] = {formula:data.formula, poolIdx:String(data.poolIdx)};
      touchDragData=null;
      s2Refresh();
    } else {
      touchDragData=null;
    }
  }
}

// ============================================================
// HELPERS
// ============================================================
function markStageComplete(idx, pts) {
  if (state.stageComplete[idx]) return;
  state.stageComplete[idx]=true;
  state.score+=pts;
  const rid=state.currentReaction.id;
  if (!state.reactionScores[rid]) state.reactionScores[rid]={stages:0};
  state.reactionScores[rid].stages=Math.max(state.reactionScores[rid].stages, idx+1);
  updateScore();
  updateStageNav();
  renderReactionSelector();
}

function updateScore() {
  document.getElementById('scoreDisplay').textContent=state.score;
  const total=reactions.length*3;
  const done=Object.values(state.reactionScores).reduce((a,v)=>a+v.stages,0);
  document.getElementById('progressFill').style.width=(done/total*100)+'%';
}

function addNextStageBtn(next) {
  const fb=document.getElementById('feedback');
  if (next<=3) {
    const btn=document.createElement('button');
    btn.className='btn btn-success';
    btn.style.marginTop='12px';
    btn.textContent=`▶ ${next}단계로 이동`;
    btn.onclick=()=>goStage(next);
    fb.appendChild(document.createElement('br'));
    fb.appendChild(btn);
  }
  if (next>3) {
    const allDone=reactions.every(r=>(state.reactionScores[r.id]?.stages||0)>=3);
    if (allDone) { setTimeout(showAllComplete,800); }
    else {
      const btn=document.createElement('button');
      btn.className='btn btn-success';
      btn.style.marginTop='12px';
      btn.textContent='🎊 다른 반응 도전하기';
      btn.onclick=()=>{
        document.getElementById('stageNav').style.display='none';
        document.getElementById('gameArea').style.display='none';
        state.currentReaction=null;
        renderReactionSelector();
      };
      fb.appendChild(document.createElement('br'));
      fb.appendChild(btn);
    }
  }
}

function showAllComplete() {
  document.getElementById('stageNav').style.display='none';
  document.getElementById('gameArea').style.display='none';
  document.getElementById('reactionSelector').style.display='none';
  document.getElementById('finalScore').textContent=state.score+'점';
  document.getElementById('allComplete').classList.add('show');
}

function resetAll() {
  state={...state, score:0, reactionScores:{}, currentReaction:null, currentStage:1, stageComplete:[false,false,false], s1_left:[], s1_right:[], s1_pool:[], s2_pool:[], s2_slots:{}};
  document.getElementById('allComplete').classList.remove('show');
  document.getElementById('reactionSelector').style.display='grid';
  document.getElementById('stageNav').style.display='none';
  document.getElementById('gameArea').style.display='none';
  updateScore();
  renderReactionSelector();
}

function showFeedback(msg,type) {
  const fb=document.getElementById('feedback');
  fb.innerHTML=msg;
  fb.className=`feedback show ${type==='correct'?'correct-fb':type==='hint'?'hint-fb':'wrong-fb'}`;
}
function hideFeedback() { const fb=document.getElementById('feedback'); if(fb) fb.className='feedback'; }

function showHint() {
  const r=state.currentReaction, n=state.currentStage;
  function s2h() {
    const allNames=[...r.reactants,...r.products];
    const tips=allNames.map(name=>{
      const atoms=r.atoms[r.formulaRaw[name]]||{};
      const list=Object.entries(atoms).map(([el,cnt])=>`${el} ${cnt}개`).join(', ');
      return `<strong>${name}</strong>: ${list}`;
    }).join('<br>');
    return `💡 각 물질의 원소 구성:<br>${tips}`;
  }
  function s3h() {
    const la={},ra={};
    r.reactants.forEach(n=>{ const a=r.atoms[r.formulaRaw[n]]||{}; Object.entries(a).forEach(([el,v])=>{la[el]=(la[el]||0)+v;}); });
    r.products.forEach(n=>{ const a=r.atoms[r.formulaRaw[n]]||{}; Object.entries(a).forEach(([el,v])=>{ra[el]=(ra[el]||0)+v;}); });
    const all=new Set([...Object.keys(la),...Object.keys(ra)]);
    const lines=Array.from(all).map(el=>{
      const l=la[el]||0, rv=ra[el]||0;
      return l===rv?`${el}: 반응 전 ${l} = 반응 후 ${rv} ✓`:`${el}: 반응 전 ${l} ≠ 반응 후 ${rv} → 계수 조정 필요`;
    }).join('<br>');
    return `💡 계수 없이(전부 1) 원소 개수:<br>${lines}`;
  }
  const hints=[
    `💡 반응물은 화살표 왼쪽, 생성물은 오른쪽. 반응물 ${r.reactants.length}개, 생성물 ${r.products.length}개예요.`,
    s2h(), s3h()
  ];
  showFeedback(hints[n-1],'hint');
}

function renderFormula(f) {
  return String(f).replace(/(\d+)/g,'<sub>$1</sub>');
}
function arraysMatch(a,b) { return a.length===b.length&&a.every((v,i)=>v===b[i]); }
function shuffle(arr) {
  for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
  return arr;
}

// ============================================================
// NAV & SELECTION
// ============================================================
function init() { renderReactionSelector(); updateScore(); }

function renderReactionSelector() {
  const el=document.getElementById('reactionSelector');
  el.innerHTML=reactions.map(r=>{
    const sc=state.reactionScores[r.id]||{stages:0};
    const done=sc.stages===3;
    return `<div class="reaction-card ${state.currentReaction?.id===r.id?'selected':''} ${done?'completed':''}"
      onclick="selectReaction(${r.id})">
      <div class="emoji">${r.emoji}</div>
      <div class="name">${r.name}</div>
      <div style="font-size:0.72rem;color:var(--accent);margin:4px 0">Lv.${r.level} ${'⭐'.repeat(r.level)}</div>
      <div class="status">${done?'✅ 완료!':sc.stages>0?`${sc.stages}단계 완료`:'도전 전'}</div>
    </div>`;
  }).join('');
}

function selectReaction(id) {
  state.currentReaction=reactions[id];
  state.currentStage=1;
  state.stageComplete=[false,false,false];
  const sc=state.reactionScores[id];
  if (sc) { for(let i=0;i<sc.stages;i++) state.stageComplete[i]=true; state.currentStage=Math.min(sc.stages+1,3); }
  renderReactionSelector();
  document.getElementById('stageNav').style.display='flex';
  document.getElementById('gameArea').style.display='block';
  updateStageNav();
  renderStage(state.currentStage);
}

function goStage(n) {
  if (n>1&&!state.stageComplete[n-2]) { showFeedback('이전 단계를 먼저 완료하세요!','hint'); return; }
  state.currentStage=n; updateStageNav(); renderStage(n);
}

function updateStageNav() {
  [1,2,3].forEach(i=>{
    const btn=document.getElementById(`stageBtn${String.fromCharCode(64+i)}`);
    btn.className='stage-btn';
    if (i===state.currentStage) btn.classList.add('active');
    if (state.stageComplete[i-1]) btn.classList.add('done');
  });
}

function renderStage(n) {
  hideFeedback(); clearTapSelection();
  if (n===1) renderStage1();
  else if (n===2) renderStage2();
  else renderStage3();
}

init();
</script>
